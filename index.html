<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARUOMILABO Studio OFFICIAL SITE</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:300;400&family=DM+Serif+Display&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f4f3ef;
--bg-soft:#ebe9e4;
--fg:#1a1a1a;
--fg-mid:#555;
--fg-light:#9a9a9a;
--border:rgba(0,0,0,0.08);
--serif:'DM Serif Display','Noto Serif JP',serif;
--sans:'Noto Sans JP',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:linear-gradient(180deg,#f8f7f5,#f1efe9);
color:var(--fg);
font-family:var(--sans);
letter-spacing:.02em;
line-height:1.8;
}

/* NAV */
nav{
position:fixed;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(255,255,255,.75);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
}

.nav-links{
display:flex;
gap:32px;
list-style:none;
}

.nav-links a{
text-decoration:none;
color:var(--fg-mid);
font-size:.75rem;
letter-spacing:.14em;
}

.nav-links a:hover{color:var(--fg);}

/* HERO */
header{
height:100vh;
display:flex;
align-items:flex-end;
padding:0 48px 80px;
background:linear-gradient(120deg,#f4f3ef,#e9e6df);
}

.hero-title{
font-family:var(--serif);
font-size:clamp(2.8rem,4vw,4.5rem);
}

.hero-title em{color:#888;}

/* SECTION */
.section{
padding:100px 48px;
max-width:1100px;
margin:auto;
}

.section-label{
font-size:.65rem;
letter-spacing:.25em;
color:var(--fg-light);
margin-bottom:40px;
}

/* ABOUT */
.about-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
}

.about-body{color:var(--fg-mid);}

.about-meta{
background:var(--bg-soft);
border:1px solid var(--border);
padding:16px;
}

/* WORKS */
.works-bg{background:#161616;color:#fff;}

.work-item{
background:#222;
margin-bottom:16px;
position:relative;
border:1px solid rgba(255,255,255,.05);
}

.work-inner{aspect-ratio:16/9;}

.work-bg{
position:absolute;
inset:0;
background:#333;
filter:grayscale(20%);
}

.work-info{
position:absolute;
bottom:0;
padding:16px;
background:rgba(0,0,0,.7);
}

/* NEWS */
.news-bg{background:#1b1b1b;color:#fff;}

.news-item{
display:block;
padding:20px 0;
border-bottom:1px solid rgba(255,255,255,.08);
text-decoration:none;
color:#fff;
}

.news-item:hover{opacity:.7;}

/* CONTACT */
.contact-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#222;
color:#fff;
text-decoration:none;
letter-spacing:.15em;
}

.btn:hover{background:#444;}

/* FOOTER */
footer{
background:#111;
color:#aaa;
padding:40px;
display:flex;
justify-content:space-between;
}

/* アニメーション */
.reveal{
opacity:0;
transform:translateY(10px);
transition:.6s;
}

.reveal.visible{
opacity:1;
transform:none;
}

/* レスポンシブ */
@media(max-width:900px){
.about-wrap,.contact-wrap{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<nav>
<a href="#top">HARUOMILABO</a>
<ul class="nav-links">
<li><a href="#top">Top</a></li>
<li><a href="#about">About</a></li>
<li><a href="#works">Works</a></li>
<li><a href="#news">News</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<header id="top">
<h1 class="hero-title">
We make<br><em>things</em><br>visible.
</h1>
</header>

<div id="about" class="section">
<p class="section-label">About</p>
<div class="about-wrap">
<h2>独自の視点で世界を作る</h2>
<div>
<p class="about-body">
HARUOMILABO Studioは、Webサービスなどを提供するクリエイティブスタジオです。
</p>
<div class="about-meta">HARUOMILABO</div>
</div>
</div>
</div>

<div id="works" class="section works-bg">
<p class="section-label">Works</p>
<div class="work-item">
<div class="work-inner">
<div class="work-bg"></div>
<div class="work-info">まだありません</div>
</div>
</div>
</div>

<div id="news" class="section news-bg">
<p class="section-label">News</p>
<div id="newsList">Loading...</div>
</div>

<div id="contact" class="section">
<p class="section-label">Contact</p>
<div class="contact-wrap">
<h2>お問い合わせはお気軽に</h2>
<div>
<a href="https://haruomilabo.net/haruomilabo_inquiry/" class="btn">
お問い合わせ →
</a>
</div>
</div>
</div>

<footer>
<span>© 2026 HARUOMILABO Studio</span>
</footer>

<script>
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add('visible');
}
});
});

document.querySelectorAll('.section').forEach(el=>{
el.classList.add('reveal');
obs.observe(el);
});

document.getElementById('newsList').innerHTML =
'<div>現在ニュースはありません。</div>';
</script>

</body>
</html>
